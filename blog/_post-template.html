  BLOG POST TEMPLATE — to publish a post:
    1. Copy this file, e.g.:  cp blog/_post-template.html blog/my-post.html
    2. Replace the title, date, and content below (search for EDIT).
    3. Optional: drop a cover image at assets/blog/my-post.jpg
    4. Add an entry to js/posts.js:
         {
           title: "My post title",
           date: "2026-08-01",
           url: "/blog/my-post.html",
           image: "/assets/blog/my-post.jpg",   // omit for a sprig placeholder
           tags: ["LLM"],

  (Files starting with _ are ignored by the listing since it's driven by posts.js.)
-->
